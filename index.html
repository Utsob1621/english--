<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English জানালা</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <nav id="nav-container" class="hidden">
        <div class="navbar bg-base-100 shadow-sm mx-auto lg:px-20">
          <div class="navbar-start flex gap-2">
            <h2 class="font-semibold text-lg">English</h2>
            <img class="h-7" src="./assets/logo.png" alt="" />
            <h2 class="font-semibold text-lg">জানালা</h2>
          </div>

          <div class="navbar-end">
            <div class="dropdown dropdown-end lg:hidden">
              <div tabindex="0" role="button" class="btn btn-ghost">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-6 w-6"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"
                  />
                </svg>
              </div>
              <ul
                tabindex="0"
                class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52 gap-2"
              >
                <li>
                  <a
                    class="btn hover:bg-blue-800 hover:text-white border-2 border-blue-900 group flex justify-start"
                  >
                    <img
                      class="group-hover:invert-100 group-hover:brightness-0"
                      src="./assets/fa-circle-question.png"
                      alt=""
                    />
                    FAQ
                  </a>
                </li>
                <li>
                  <a
                    class="btn hover:bg-blue-800 hover:text-white border-2 border-blue-900 group flex justify-start"
                  >
                    <img
                      class="group-hover:invert-100 group-hover:brightness-0"
                      src="./assets/fa-book-open.png"
                      alt=""
                    />
                    Learn
                  </a>
                </li>
                <li>
                  <a
                    class="btn hover:bg-[#00BCFF] hover:text-white border-2 border-[#00BCFF] group flex justify-start"
                  >
                    <img
                      class="group-hover:invert-100 group-hover:brightness-0"
                      src="./assets/fa-arrow-right-from-bracket.png"
                      alt=""
                    />
                    Logout
                  </a>
                </li>
              </ul>
            </div>

            <div class="hidden lg:flex gap-2 lg:gap-8">
              <a
                id="fcq"
                class="btn hover:bg-[#00BCFF] hover:text-white border-2 border-[#00BCFF] group"
              >
                <img
                  class="group-hover:invert-100 group-hover:brightness-0"
                  src="./assets/fa-circle-question.png"
                  alt=""
                />
                FAQ
              </a>
              <a
                id="learn"
                class="btn hover:bg-[#00BCFF] hover:text-white border-2 border-[#00BCFF] group"
              >
                <img
                  class="group-hover:invert-100 group-hover:brightness-0"
                  src="./assets/fa-book-open.png"
                  alt=""
                />
                Learn
              </a>
              <a
                id="logout"
                class="btn hover:bg-[#00BCFF] hover:text-white border-2 border-[#00BCFF] group"
              >
                <img
                  class="group-hover:invert-100 group-hover:brightness-0"
                  src="./assets/fa-arrow-right-from-bracket.png"
                  alt=""
                />
                Logout
              </a>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <main class="w-11/12 mx-auto">
      <section id="banner-section">
        <div class="lg:flex justify-between items-center mt-5">
          <div class="space-y-5">
            <h2 class="text-[#00BCFF] font-bold text-5xl">
              English <span class="text-black">is Easy!!</span>
            </h2>
            <div>
              <p class="font-medium text-2xl lg:w-[730px]">
                আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন
                অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে
                নিয়ে যাবে অন্য একটি Level এ
              </p>
            </div>
            <div>
              <input type="text" placeholder="Enter your name" class="input" />
            </div>
            <div>
              <input
                id="password"
                type="text"
                placeholder="Enter your password"
                class="input"
              />
            </div>
            <button id="get-start" class="btn btn-info hover:text-white">
              Get Started
            </button>
          </div>
          <div>
            <img src="./assets/hero-student.png" alt="" />
          </div>
        </div>
      </section>
    </main>
    <script src="./script/index.js"></script>
  </body>
</html>
